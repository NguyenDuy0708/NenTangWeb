<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Đăng ký</h1>
    <form id="form" novalidate>
      <label>
        Tên
        <div class="field-row">
          <input id="name" type="text" placeholder="Họ và tên">
          <span id="nameIcon" class="icon"></span>
        </div>
        <small class="msg" id="nameMsg"></small>
      </label>

      <label>
        Email
        <div class="field-row">
          <input id="email" type="email" placeholder="email@domain.com">
        </div>
        <small class="msg" id="emailMsg"></small>
      </label>

      <label>
        Mật khẩu
        <input id="password" type="password" placeholder="Mật khẩu">
        <div class="pw-meter">
          <div id="pwBar" class="bar"></div>
        </div>
        <small class="msg" id="pwMsg"></small>
      </label>

      <label>
        Xác nhận mật khẩu
        <input id="confirm" type="password" placeholder="Nhập lại mật khẩu">
        <small class="msg" id="confirmMsg"></small>
      </label>

      <label>
        Số điện thoại
        <input id="phone" type="tel" placeholder="0901-234-567" maxlength="13">
        <small class="msg" id="phoneMsg"></small>
      </label>

      <button id="submit" type="submit" disabled>Đăng ký</button>
    </form>
  </main>

  <div id="modal" class="modal hidden">
    <div class="panel">
      <h2>Đăng ký thành công!</h2>
      <div id="modalContent"></div>
      <button id="closeModal">Đóng</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
