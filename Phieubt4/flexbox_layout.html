<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>

    <link rel="stylesheet" href="flexbox.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">ShopTLU</div>
        <nav class="menu">
            <a href="#">Home</a>

            <a href="#">About</a>

        <div class="auth">
            <button>Login</button>
            <button>Register</button>
        </div>

    <section class="products">
        <div class="product-card">
            <img src="https://picsum.photos/300/200?1">
            <div class="info">
                <h3>Iphone 15</h3>
                <p>25.000.000đ</p>
            </div>
            <button class="buy-btn">Mua</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?2">
            <div class="info">
                <h3>Macbook Air</h3>
                <p>32.000.000đ</p>
            </div>

        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?3">
            <div class="info">
                <h3>Samsung S25</h3>
                <p>21.000.000đ</p>
            </div>
            <button class="buy-btn">Mua</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?4">
            <div class="info">
                <h3>Airpods</h3>
                <p>5.000.000đ</p>
            </div>

        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?5">

                <h3>Apple Watch</h3>
                <p>9.000.000đ</p>
            </div>
            <button class="buy-btn">Mua</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?6">

                <h3>Ipad Pro</h3>

        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?7">
            <div class="info">
                <h3>Dell XPS</h3>
                <p>38.000.000đ</p>
            </div>
            <button class="buy-btn">Mua</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/200?8">
            <div class="info">
                <h3>Gaming Mouse</h3>
                <p>1.500.000đ</p>

            <button class="buy-btn">Mua</button>
