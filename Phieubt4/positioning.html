<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu B1</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>
    <header class="header">
        <div class="logo">ShopTLU</div>
        <nav class="nav">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>
    <main class="container">
        <aside class="sidebar">
            <h2>Danh mục</h2>
            <ul>
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Tablet</li>
                <li>Phụ kiện</li>
            </ul>
        </aside>
        <section class="products">
            <div class="card">
                <span class="badge">HOT</span>
                <img src="https://picsum.photos/300/200?1" alt="product">
                <h3>Iphone 15</h3>
                <p>Giá: 25.000.000đ</p>
            </div>
            <div class="card">
                <span class="badge">HOT</span>
                <img src="https://picsum.photos/300/200?2" alt="product">
                <h3>Macbook Air</h3>
                <p>Giá: 32.000.000đ</p>
            </div>
            <div class="card">
                <span class="badge">HOT</span>
                <img src="https://picsum.photos/300/200?3" alt="product">
                <h3>Samsung S25</h3>
                <p>Giá: 21.000.000đ</p>
            </div>
            <div class="dummy"></div>
        </section>
    </main>
    <button class="scroll-top">↑</button>
</body>
</html>
