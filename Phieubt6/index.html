<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Product Card + Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card {
            transition: 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card product-card position-relative">
                    <span class="badge bg-danger position-absolute">SALE</span>
                </div>
                <img src="https://picsum.photos/200/300" alt="Product">
                <div class="card-body">
                    <h5 class=" card-title"> Tai nghe Blutooth</h5>
                    <p class="card-text">Gía sale chỉ hôm nay</p>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">Xem nhanh</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"> Chi tiết sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">
                    <img src="https://picsum.photos/500/300" class="img-fluid mb-3" alt="Product">
                    <p>
                        Tai nghe Bluetooth hỗ trợ kết nối nhanh,
                        pin sử dụng lên đến 20 giờ.
                    </p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <buttom type="button" class="btn btn-success">Mua ngay</buttom>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
