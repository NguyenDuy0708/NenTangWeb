<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Giới thiệu sản phẩm iPhone 16</h1>
    <h2>Logo thương hiệu</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" fill="black" />
    </svg>

    <h2>Hình ảnh sản phẩm</h2>
    <figure>
        <img src="screenshots/iphone16.1.jpg" alt="iPhone 16 Pro Max màu titan nhìn từ phía trước" loading="lazy" style="max-width:100%; height:auto;">
        <figcaption>Mặt trước iPhone 16 Pro Max</figcaption>
    </figure>

    <figure>
        <img src="screenshots/iphone16.jpeg" alt="Mặt sau iPhone 16 Pro Max với cụm camera" loading="lazy" style="max-width:100%; height:auto;">
        <figcaption>Mặt sau với camera cao cấp</figcaption>
    </figure>

    <figure>
        <img src="screenshots/iphone16.png " alt="Cạnh bên iPhone 16 Pro Max thiết kế viền mỏng" loading="lazy" style="max-width:100%; height:auto;">
        <figcaption>Thiết kế viền mỏng sang trọng</figcaption>
    </figure>

    <h2>Video giới thiệu (YouTube)</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/N3lmmaAyHVI?si=0wfqpTm5b7OF0sxh" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Video sản phẩm</h2>
    <video controls poster="media/poster.jpg" style="max-width:100%; height:auto;">
        <source src="media/mp4.mp4" type="video/mp4">
        <source src="media/webm.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ video.
    </video>

    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="media/intro.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
