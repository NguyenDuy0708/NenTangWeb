<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <header class="header">
        <h1>ShopTLU Animations</h1>
    </header>

    <section class="spinner-section">
        <h2>Loading...</h2>
        <div class="spinner"></div>
    </section>

    <section class="products">
        <div class="card fade-in">
            <div class="image-wrapper">
                <img src="https://picsum.photos/300/200?1" alt="product">
            </div>
            <div class="card-content">
                <h3>Iphone 15</h3>
                <p>25.000.000đ</p>
                <button>Mua ngay</button>
            </div>
        </div>

        <div class="card fade-in">
            <div class="image-wrapper">
                <img src="https://picsum.photos/300/200?2" alt="product">
            </div>
            <div class="card-content">
                <h3>Macbook Air</h3>
                <p>32.000.000đ</p>
                <button>Mua ngay</button>
            </div>
        </div>

        <div class="card fade-in">
            <div class="image-wrapper">
                <img src="https://picsum.photos/300/200?3" alt="product">
            </div>
            <div class="card-content">
                <h3>Samsung S25</h3>
                <p>21.000.000đ</p>
                <button>Mua ngay</button>
            </div>
        </div>

        <div class="card fade-in">
            <div class="image-wrapper">
                <img src="https://picsum.photos/300/200?4" alt="product">
            </div>
            <div class="card-content">
                <h3>Airpods Pro</h3>
                <p>6.000.000đ</p>
                <button>Mua ngay</button>
            </div>
        </div>
    </section>
</body>
</html>
