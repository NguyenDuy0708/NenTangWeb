<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <link rel="stylesheet" href="responsive.css">

    <link rel="stylesheet" href="scss/style.css">

</head>
<body>
    <header class="header">
        <div class="logo">ShopTLU</div>
        <div class="hamburger">☰</div>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <h2>Bộ lọc</h2>
            <div class="filters">
                <select>
                    <option>Danh mục</option>
                    <option>Laptop</option>
                    <option>Điện thoại</option>
                    <option>Tablet</option>
                </select>
                <select>
                    <option>Thương hiệu</option>
                    <option>Apple</option>
                    <option>Samsung</option>
                    <option>Dell</option>
                </select>
            </div>
        </aside>
        <main class="products">
            <div class="card">
                <img src="https://picsum.photos/300/200?1">
                <h3>Iphone 15</h3>
                <p>25.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?2">
                <h3>Macbook Air</h3>
                <p>32.000.000đ</p>
                <button>Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://picsum.photos/300/200?3">
                <h3>Samsung S25</h3>
                <p>21.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?4">
                <h3>Airpods Pro</h3>
                <p>6.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?5">
                <h3>Ipad Pro</h3>
                <p>28.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?6">
                <h3>Dell XPS</h3>
                <p>38.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?7">
                <h3>Apple Watch</h3>
                <p>9.000.000đ</p>
                <button>Mua ngay</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?8">
                <h3>Gaming Mouse</h3>
                <p>1.500.000đ</p>
                <button>Mua ngay</button>
            </div>
        </main>

        <aside class="ads">
            <h2>Quảng cáo</h2>
            <img src="https://picsum.photos/250/400?9">
        </aside>
    </div>
    <footer class="footer">
        <p>© 2026 ShopTLU - All Rights Reserved</p>
    </footer>
</body>
</html>
